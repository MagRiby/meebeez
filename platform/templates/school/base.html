<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>{% block title %}لوحة التحكم{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='mobile.css') }}" rel="stylesheet">
    <style>
      body { background: #f8fafc; }
    </style>
    {% block head %}{% endblock %}
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
</head>
<body>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    // Auto-attach CSRF token to all fetch/XHR requests
    (function() {
        var token = document.querySelector('meta[name="csrf-token"]');
        if (!token) return;
        var csrfToken = token.getAttribute('content');
        var _fetch = window.fetch;
        window.fetch = function(url, opts) {
            opts = opts || {};
            if (opts.method && opts.method !== 'GET') {
                opts.headers = opts.headers || {};
                if (opts.headers instanceof Headers) {
                    opts.headers.set('X-CSRFToken', csrfToken);
                } else {
                    opts.headers['X-CSRFToken'] = csrfToken;
                }
            }
            return _fetch(url, opts);
        };
    })();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
