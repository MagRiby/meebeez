<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="theme-color" content="#2563eb">
    <title>معلومات المدرسة</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="/static/mobile.css" rel="stylesheet">
    <style>
        .school-info-container {
            background: var(--color-surface, #fff);
            border-radius: 1rem;
            box-shadow: 0 6px 18px rgba(0,0,0,0.04);
            padding: 2rem;
            margin: 2rem auto;
            max-width: 500px;
            text-align: center;
        }
        .school-logo {
            max-width: 120px;
            margin-bottom: 1rem;
        }
        .info-label {
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="school-info-container">
        <div class="d-flex justify-content-start mb-3">
            <a href="/dashboard" class="btn btn-outline-primary">العودة إلى لوحة التحكم</a>
        </div>
        <form method="POST" enctype="multipart/form-data">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <img src="/static/{{ school_info.logo }}" alt="شعار المدرسة" class="school-logo mb-3">
            <div class="mb-3">
                <label class="info-label" for="name">اسم المدرسة:</label>
                <input type="text" id="name" name="name" class="form-control" value="{{ school_info.name }}" required>
            </div>
            <div class="mb-3">
                <label class="info-label" for="address">العنوان:</label>
                <input type="text" id="address" name="address" class="form-control" value="{{ school_info.address }}" required>
            </div>
            <div class="mb-3">
                <label class="info-label" for="contact">الاتصال:</label>
                <input type="text" id="contact" name="contact" class="form-control" value="{{ school_info.contact }}" required>
            </div>
            <div class="mb-3">
                <label class="info-label" for="email">البريد الإلكتروني:</label>
                <input type="email" id="email" name="email" class="form-control" value="{{ school_info.email }}" required>
            </div>
            <div class="mb-3">
                <label class="info-label" for="logo">شعار المدرسة:</label>
                <input type="file" id="logo" name="logo" class="form-control">
                <small class="text-muted">سيتم استبدال الشعار الحالي إذا تم رفع صورة جديدة</small>
            </div>
            <button type="submit" class="btn btn-success w-100">حفظ المعلومات</button>
        </form>
    </div>
</body>
</html>
