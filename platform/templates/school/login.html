<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>تسجيل الدخول</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="/static/mobile.css" rel="stylesheet">
    <style>
        body { background: var(--color-bg, #f1f5f9); }
        .login-container {
            max-width: 400px;
            margin: 70px auto;
            padding: 2rem 2.5rem 2rem 2.5rem;
            background: var(--color-surface, #fff);
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
        }
        .login-title {
            font-weight: bold;
            margin-bottom: 1.5rem;
            text-align: center;
            color: var(--color-text, #1e293b);
        }
        .form-label { font-weight: 500; }
        .btn-primary {
            width: 100%;
            background-color: var(--color-primary, #2563eb) !important;
            border-color: var(--color-primary, #2563eb) !important;
        }
        .btn-primary:hover {
            background-color: #1d4ed8 !important;
            border-color: #1d4ed8 !important;
        }
        .logo {
            display: block;
            margin: 0 auto 1.5rem auto;
            width: 54px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="logo" class="logo">
        <div class="login-title">تسجيل الدخول للنظام</div>
        {% if error %}
            <div class="alert alert-danger text-center" role="alert">
                {{ error }}
            </div>
        {% endif %}
        <form method="POST">
            <div class="mb-3">
                <label for="username" class="form-label">اسم المستخدم</label>
                <input type="text" class="form-control" id="username" name="username" required autofocus>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">كلمة المرور</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            {% if error %}
            <div class="alert alert-danger text-center">{{ error }}</div>
            {% endif %}
            <button type="submit" class="btn btn-primary">دخول</button>
        </form>
        <div class="text-center mt-3">
            <a href="#">هل نسيت كلمة المرور؟</a>
        </div>
    </div>
</body>
</html>
