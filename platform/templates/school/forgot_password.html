<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="theme-color" content="#2563eb">
    <title>نسيت كلمة المرور</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="/static/mobile.css" rel="stylesheet">
    <style>
        body { background: #f8fafc; }
        .reset-container {
            max-width: 400px;
            margin: 40px auto;
            padding: 2rem 1.5rem;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <h2 class="text-center mb-4">نسيت كلمة المرور</h2>
        <form method="POST">
            <div class="mb-3">
                <label for="email" class="form-label">اسم المستخدم (البريد الإلكتروني):</label>
                <input type="text" id="email" name="email" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">إرسال رابط الاستعادة</button>
        </form>
        {% if message %}
            <div class="alert alert-info mt-3 text-center">{{ message }}</div>
        {% endif %}
        <div class="text-center mt-3">
            <a href="/login">العودة إلى تسجيل الدخول</a>
        </div>
    </div>
</body>
</html>
