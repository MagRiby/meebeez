<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="theme-color" content="#2563eb">
    <title>تسجيل المدير الأعلى</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="/static/mobile.css" rel="stylesheet">
    <style>
        body { background: #f8fafc; }
        .register-container {
            max-width: 400px;
            margin: 40px auto;
            padding: 2rem 1.5rem;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
        }
    </style>
</head>
<body>
    <div class="register-container">
        <h2 class="text-center mb-4">تسجيل المدير الأعلى</h2>
        <form method="post">
            <div class="mb-3">
                <label for="username" class="form-label">اسم المستخدم</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="اسم المستخدم" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">كلمة المرور</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="كلمة المرور" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">تسجيل المدير الأعلى</button>
        </form>
    </div>
</body>
</html>
