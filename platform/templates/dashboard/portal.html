{% extends "base.html" %}

{% block title %}البوابة الموحدة{% endblock %}

{% block content %}
<h2 class="mb-4">بوابتك الموحدة</h2>
<p class="text-muted">جميع الأعمال التي أنت مشترك فيها في مكان واحد</p>

<div id="portal-list">
    <div class="text-center py-4">
        <div class="spinner-border text-primary" role="status"></div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
const token = localStorage.getItem('token');
const headers = {};
if (token) headers['Authorization'] = 'Bearer ' + token;

async function loadPortal() {
    const res = await fetch('/api/portal', { headers });
    const container = document.getElementById('portal-list');

    if (!res.ok) {
        container.innerHTML = '<p class="text-muted">يرجى تسجيل الدخول لعرض أعمالك</p>';
        return;
    }

    const tenants = await res.json();

    if (tenants.length === 0) {
        container.innerHTML = `
            <div class="text-center py-5">
                <i class="fas fa-store fa-3x text-muted mb-3"></i>
                <p class="text-muted">لم تنضم لأي عمل بعد</p>
                <a href="/" class="btn btn-primary">تصفح التطبيقات</a>
            </div>`;
        return;
    }

    container.innerHTML = '<div class="row g-3">' + tenants.map(t => `
        <div class="col-md-4">
            <div class="card h-100 shadow-sm">
                <div class="card-body text-center">
                    <h5 class="card-title">${t.name}</h5>
                    <span class="badge bg-secondary mb-2">${t.app_type}</span>
                    <br>
                    <span class="badge bg-${t.status === 'active' ? 'success' : 'warning'}">${t.status}</span>
                    <p class="mt-2 text-muted small">دورك: ${t.role}</p>
                    <a href="/t/${t.slug}/${t.app_type}/" class="btn btn-outline-primary btn-sm">دخول</a>
                </div>
            </div>
        </div>
    `).join('') + '</div>';
}

loadPortal();
</script>
{% endblock %}
