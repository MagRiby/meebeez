{% extends "base.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}
<h2 class="mb-4">Dashboard</h2>

<div class="row mb-4">
    <div class="col-md-8">
        <h5>Your Projects</h5>
        <div id="tenants-list">
            <div class="text-center py-4">
                <div class="spinner-border text-primary" role="status"></div>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Create New Project</h5>
                <form id="create-tenant-form">
                    <div class="mb-3">
                        <label for="tenant-name" class="form-label">Project Name</label>
                        <input type="text" class="form-control" id="tenant-name" required>
                    </div>
                    <div class="mb-3">
                        <label for="app-slug" class="form-label">App Type</label>
                        <select class="form-select" id="app-slug" required>
                            <option value="">Select...</option>
                        </select>
                    </div>
                    <div id="create-error" class="alert alert-danger d-none"></div>
                    <button type="submit" class="btn btn-success w-100">Create</button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Edit Project Modal -->
<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Edit Project</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit-slug">
                <div class="mb-3">
                    <label for="edit-name" class="form-label">Project Name</label>
                    <input type="text" class="form-control" id="edit-name" required>
                </div>
                <div id="edit-error" class="alert alert-danger d-none"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="saveTenant()">Save</button>
            </div>
        </div>
    </div>
</div>

<!-- Delete Confirmation Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Delete Project</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to delete <strong id="delete-name"></strong>? This action cannot be undone.</p>
                <input type="hidden" id="delete-slug">
                <div id="delete-error" class="alert alert-danger d-none"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-danger" onclick="deleteTenant()">Delete</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
const token = localStorage.getItem('token');
const headers = { 'Content-Type': 'application/json' };
if (token) headers['Authorization'] = 'Bearer ' + token;

async function loadApps() {
    const res = await fetch('/api/apps');
    const apps = await res.json();
    const select = document.getElementById('app-slug');
    apps.forEach(a => {
        const opt = document.createElement('option');
        opt.value = a.slug;
        opt.textContent = a.name;
        select.appendChild(opt);
    });
}

async function loadTenants() {
    const res = await fetch('/api/tenants', { headers });
    if (!res.ok) {
        document.getElementById('tenants-list').innerHTML =
            '<p class="text-muted">Please log in to view your projects</p>';
        return;
    }
    const tenants = await res.json();
    const container = document.getElementById('tenants-list');

    if (tenants.length === 0) {
        container.innerHTML = '<p class="text-muted">No projects yet. Create your first one!</p>';
        return;
    }

    container.innerHTML = tenants.map(t => `
        <div class="card mb-2">
            <div class="card-body d-flex justify-content-between align-items-center">
                <div>
                    <h6 class="mb-0">${t.name}</h6>
                    <small class="text-muted">${t.app_type} &middot; ${t.status}</small>
                </div>
                <div>
                    <a href="/t/${t.slug}/${t.app_type}/" class="btn btn-sm btn-outline-primary me-1">Open</a>
                    <button class="btn btn-sm btn-outline-secondary me-1" onclick="openEdit('${t.slug}', '${t.name}')">
                        <i class="fas fa-edit"></i>
                    </button>
                    <button class="btn btn-sm btn-outline-danger" onclick="openDelete('${t.slug}', '${t.name}')">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </div>
        </div>
    `).join('');
}

function openEdit(slug, name) {
    document.getElementById('edit-slug').value = slug;
    document.getElementById('edit-name').value = name;
    document.getElementById('edit-error').classList.add('d-none');
    new bootstrap.Modal(document.getElementById('editModal')).show();
}

async function saveTenant() {
    const slug = document.getElementById('edit-slug').value;
    const name = document.getElementById('edit-name').value.trim();
    const errorDiv = document.getElementById('edit-error');
    errorDiv.classList.add('d-none');

    if (!name) {
        errorDiv.textContent = 'Name is required';
        errorDiv.classList.remove('d-none');
        return;
    }

    const res = await fetch('/api/tenants/' + slug, {
        method: 'PUT',
        headers,
        body: JSON.stringify({ name }),
    });
    const result = await res.json();

    if (res.ok) {
        bootstrap.Modal.getInstance(document.getElementById('editModal')).hide();
        loadTenants();
    } else {
        errorDiv.textContent = result.error;
        errorDiv.classList.remove('d-none');
    }
}

function openDelete(slug, name) {
    document.getElementById('delete-slug').value = slug;
    document.getElementById('delete-name').textContent = name;
    document.getElementById('delete-error').classList.add('d-none');
    new bootstrap.Modal(document.getElementById('deleteModal')).show();
}

async function deleteTenant() {
    const slug = document.getElementById('delete-slug').value;
    const errorDiv = document.getElementById('delete-error');
    errorDiv.classList.add('d-none');

    const res = await fetch('/api/tenants/' + slug, {
        method: 'DELETE',
        headers,
    });
    const result = await res.json();

    if (res.ok) {
        bootstrap.Modal.getInstance(document.getElementById('deleteModal')).hide();
        loadTenants();
    } else {
        errorDiv.textContent = result.error;
        errorDiv.classList.remove('d-none');
    }
}

document.getElementById('create-tenant-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorDiv = document.getElementById('create-error');
    errorDiv.classList.add('d-none');

    const data = {
        name: document.getElementById('tenant-name').value,
        app_slug: document.getElementById('app-slug').value,
    };

    const res = await fetch('/api/tenants', {
        method: 'POST',
        headers,
        body: JSON.stringify(data),
    });
    const result = await res.json();

    if (res.ok) {
        loadTenants();
        document.getElementById('create-tenant-form').reset();
    } else {
        errorDiv.textContent = result.error;
        errorDiv.classList.remove('d-none');
    }
});

loadApps();
loadTenants();
</script>
{% endblock %}
