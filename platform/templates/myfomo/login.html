<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>myFomo - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        body { min-height: 100dvh; display: flex; align-items: center; }
        .login-card { width: 100%; max-width: 420px; margin: 0 auto; }
        .form-control { font-size: 16px; }
    </style>
</head>
<body class="bg-light">
    <div class="container px-3">
        <div class="login-card">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <i class="fas fa-bullhorn fa-3x text-primary"></i>
                        <h3 class="mt-2 fw-bold">myFomo</h3>
                        <small class="text-muted">{{ tenant_slug }}</small>
                    </div>
                    {% if error %}
                    <div class="alert alert-danger py-2">{{ error }}</div>
                    {% endif %}
                    <form method="POST" action="{{ url_for('myfomo.myfomo_login', tenant_slug=tenant_slug) }}">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" class="form-control form-control-lg" id="username" name="username" required autofocus autocomplete="username">
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control form-control-lg" id="password" name="password" required autocomplete="current-password">
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg w-100">Login</button>
                    </form>
                    <div class="text-center mt-3">
                        <small class="text-muted">Don't have an account?</small>
                        <a href="{{ url_for('myfomo.myfomo_register', tenant_slug=tenant_slug) }}" class="d-block mt-1">Create a follower account</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
